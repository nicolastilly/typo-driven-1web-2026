<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Liquid Ether - Vanilla JS</title>
        <style>
            @font-face {
                font-family: 'Pilowlava';
                src: url('Pilowlava-Atome.woff2') format('woff2');
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #000;
                overflow: hidden;
            }

            .liquid-ether-container {
                position: relative;
                overflow: hidden;
                width: 100vw;
                height: 100vh;
                touch-action: none;
            }

            .liquid-ether-container canvas {
                display: block;
                width: 100%;
                height: 100%;
            }

            /* Demo overlay */
            .content {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                text-align: center;
                color: white;
                font-family: system-ui, -apple-system, sans-serif;
                pointer-events: none;
                z-index: 10;
            }

            .content h1 {
                font-size: clamp(2rem, 8vw, 5rem);
                font-weight: 200;
                letter-spacing: 0.3em;
                text-transform: uppercase;
                mix-blend-mode: difference;
                font-family: 'Pilowlava';
            }
        </style>
    </head>

    <body>
        <div id="container" class="liquid-ether-container"></div>

        <div class="content">
            <h1>Pilowlava</h1>
        </div>

        <!-- Three.js from CDN -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

        <script>
            /**
             * Liquid Ether - Vanilla JavaScript
             * 
             * A fluid simulation effect using Navier-Stokes equations with WebGL/Three.js.
             * Features mouse interaction and automatic demo mode.
             * 
             * Based on the React Bits LiquidEther component.
             */

            class LiquidEther {
                constructor(container, options = {}) {
                    this.container = typeof container === 'string'
                        ? document.querySelector(container)
                        : container;

                    if (!this.container) {
                        console.error('LiquidEther: Container not found');
                        return;
                    }

                    // Default options
                    this.options = {
                        colors: ['#5227FF', '#FF9FFC', '#B19EEF'],
                        mouseForce: 20,
                        cursorSize: 100,
                        isViscous: false,
                        viscous: 30,
                        iterationsViscous: 32,
                        iterationsPoisson: 32,
                        resolution: 0.5,
                        isBounce: false,
                        dt: 0.014,
                        BFECC: true,
                        autoDemo: true,
                        autoSpeed: 0.5,
                        autoIntensity: 2.2,
                        takeoverDuration: 0.25,
                        autoResumeDelay: 1000,
                        autoRampDuration: 0.6,
                        ...options
                    };

                    this.rafId = null;
                    this.isRunning = false;
                    this.isVisible = true;

                    this.init();
                }

                // ==================== SHADERS ====================

                get shaders() {
                    return {
                        face_vert: `
        attribute vec3 position;
        uniform vec2 px;
        uniform vec2 boundarySpace;
        varying vec2 uv;
        precision highp float;
        void main(){
          vec3 pos = position;
          vec2 scale = 1.0 - boundarySpace * 2.0;
          pos.xy = pos.xy * scale;
          uv = vec2(0.5) + (pos.xy) * 0.5;
          gl_Position = vec4(pos, 1.0);
        }
      `,

                        line_vert: `
        attribute vec3 position;
        uniform vec2 px;
        precision highp float;
        varying vec2 uv;
        void main(){
          vec3 pos = position;
          uv = 0.5 + pos.xy * 0.5;
          vec2 n = sign(pos.xy);
          pos.xy = abs(pos.xy) - px * 1.0;
          pos.xy *= n;
          gl_Position = vec4(pos, 1.0);
        }
      `,

                        mouse_vert: `
        precision highp float;
        attribute vec3 position;
        attribute vec2 uv;
        uniform vec2 center;
        uniform vec2 scale;
        uniform vec2 px;
        varying vec2 vUv;
        void main(){
          vec2 pos = position.xy * scale * 2.0 * px + center;
          vUv = uv;
          gl_Position = vec4(pos, 0.0, 1.0);
        }
      `,

                        advection_frag: `
        precision highp float;
        uniform sampler2D velocity;
        uniform float dt;
        uniform bool isBFECC;
        uniform vec2 fboSize;
        uniform vec2 px;
        varying vec2 uv;
        void main(){
          vec2 ratio = max(fboSize.x, fboSize.y) / fboSize;
          if(isBFECC == false){
            vec2 vel = texture2D(velocity, uv).xy;
            vec2 uv2 = uv - vel * dt * ratio;
            vec2 newVel = texture2D(velocity, uv2).xy;
            gl_FragColor = vec4(newVel, 0.0, 0.0);
          } else {
            vec2 spot_new = uv;
            vec2 vel_old = texture2D(velocity, uv).xy;
            vec2 spot_old = spot_new - vel_old * dt * ratio;
            vec2 vel_new1 = texture2D(velocity, spot_old).xy;
            vec2 spot_new2 = spot_old + vel_new1 * dt * ratio;
            vec2 error = spot_new2 - spot_new;
            vec2 spot_new3 = spot_new - error / 2.0;
            vec2 vel_2 = texture2D(velocity, spot_new3).xy;
            vec2 spot_old2 = spot_new3 - vel_2 * dt * ratio;
            vec2 newVel2 = texture2D(velocity, spot_old2).xy; 
            gl_FragColor = vec4(newVel2, 0.0, 0.0);
          }
        }
      `,

                        color_frag: `
        precision highp float;
        uniform sampler2D velocity;
        uniform sampler2D palette;
        uniform vec4 bgColor;
        varying vec2 uv;
        void main(){
          vec2 vel = texture2D(velocity, uv).xy;
          float lenv = clamp(length(vel), 0.0, 1.0);
          vec3 c = texture2D(palette, vec2(lenv, 0.5)).rgb;
          vec3 outRGB = mix(bgColor.rgb, c, lenv);
          float outA = mix(bgColor.a, 1.0, lenv);
          gl_FragColor = vec4(outRGB, outA);
        }
      `,

                        divergence_frag: `
        precision highp float;
        uniform sampler2D velocity;
        uniform float dt;
        uniform vec2 px;
        varying vec2 uv;
        void main(){
          float x0 = texture2D(velocity, uv - vec2(px.x, 0.0)).x;
          float x1 = texture2D(velocity, uv + vec2(px.x, 0.0)).x;
          float y0 = texture2D(velocity, uv - vec2(0.0, px.y)).y;
          float y1 = texture2D(velocity, uv + vec2(0.0, px.y)).y;
          float divergence = (x1 - x0 + y1 - y0) / 2.0;
          gl_FragColor = vec4(divergence / dt);
        }
      `,

                        externalForce_frag: `
        precision highp float;
        uniform vec2 force;
        uniform vec2 center;
        uniform vec2 scale;
        uniform vec2 px;
        varying vec2 vUv;
        void main(){
          vec2 circle = (vUv - 0.5) * 2.0;
          float d = 1.0 - min(length(circle), 1.0);
          d *= d;
          gl_FragColor = vec4(force * d, 0.0, 1.0);
        }
      `,

                        poisson_frag: `
        precision highp float;
        uniform sampler2D pressure;
        uniform sampler2D divergence;
        uniform vec2 px;
        varying vec2 uv;
        void main(){
          float p0 = texture2D(pressure, uv + vec2(px.x * 2.0, 0.0)).r;
          float p1 = texture2D(pressure, uv - vec2(px.x * 2.0, 0.0)).r;
          float p2 = texture2D(pressure, uv + vec2(0.0, px.y * 2.0)).r;
          float p3 = texture2D(pressure, uv - vec2(0.0, px.y * 2.0)).r;
          float div = texture2D(divergence, uv).r;
          float newP = (p0 + p1 + p2 + p3) / 4.0 - div;
          gl_FragColor = vec4(newP);
        }
      `,

                        pressure_frag: `
        precision highp float;
        uniform sampler2D pressure;
        uniform sampler2D velocity;
        uniform vec2 px;
        uniform float dt;
        varying vec2 uv;
        void main(){
          float step = 1.0;
          float p0 = texture2D(pressure, uv + vec2(px.x * step, 0.0)).r;
          float p1 = texture2D(pressure, uv - vec2(px.x * step, 0.0)).r;
          float p2 = texture2D(pressure, uv + vec2(0.0, px.y * step)).r;
          float p3 = texture2D(pressure, uv - vec2(0.0, px.y * step)).r;
          vec2 v = texture2D(velocity, uv).xy;
          vec2 gradP = vec2(p0 - p1, p2 - p3) * 0.5;
          v = v - gradP * dt;
          gl_FragColor = vec4(v, 0.0, 1.0);
        }
      `,

                        viscous_frag: `
        precision highp float;
        uniform sampler2D velocity;
        uniform sampler2D velocity_new;
        uniform float v;
        uniform vec2 px;
        uniform float dt;
        varying vec2 uv;
        void main(){
          vec2 old = texture2D(velocity, uv).xy;
          vec2 new0 = texture2D(velocity_new, uv + vec2(px.x * 2.0, 0.0)).xy;
          vec2 new1 = texture2D(velocity_new, uv - vec2(px.x * 2.0, 0.0)).xy;
          vec2 new2 = texture2D(velocity_new, uv + vec2(0.0, px.y * 2.0)).xy;
          vec2 new3 = texture2D(velocity_new, uv - vec2(0.0, px.y * 2.0)).xy;
          vec2 newv = 4.0 * old + v * dt * (new0 + new1 + new2 + new3);
          newv /= 4.0 * (1.0 + v * dt);
          gl_FragColor = vec4(newv, 0.0, 0.0);
        }
      `
                    };
                }

                // ==================== PALETTE TEXTURE ====================

                makePaletteTexture(stops) {
                    let arr;
                    if (Array.isArray(stops) && stops.length > 0) {
                        arr = stops.length === 1 ? [stops[0], stops[0]] : stops;
                    } else {
                        arr = ['#ffffff', '#ffffff'];
                    }

                    const w = arr.length;
                    const data = new Uint8Array(w * 4);

                    for (let i = 0; i < w; i++) {
                        const c = new THREE.Color(arr[i]);
                        data[i * 4 + 0] = Math.round(c.r * 255);
                        data[i * 4 + 1] = Math.round(c.g * 255);
                        data[i * 4 + 2] = Math.round(c.b * 255);
                        data[i * 4 + 3] = 255;
                    }

                    const tex = new THREE.DataTexture(data, w, 1, THREE.RGBAFormat);
                    tex.magFilter = THREE.LinearFilter;
                    tex.minFilter = THREE.LinearFilter;
                    tex.wrapS = THREE.ClampToEdgeWrapping;
                    tex.wrapT = THREE.ClampToEdgeWrapping;
                    tex.generateMipmaps = false;
                    tex.needsUpdate = true;
                    return tex;
                }

                // ==================== COMMON ====================

                initCommon() {
                    this.common = {
                        width: 0,
                        height: 0,
                        aspect: 1,
                        pixelRatio: Math.min(window.devicePixelRatio || 1, 2),
                        fboWidth: null,
                        fboHeight: null,
                        time: 0,
                        delta: 0,
                        renderer: null,
                        clock: null
                    };

                    this.resizeCommon();

                    this.common.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    this.common.renderer.autoClear = false;
                    this.common.renderer.setClearColor(new THREE.Color(0x000000), 0);
                    this.common.renderer.setPixelRatio(this.common.pixelRatio);
                    this.common.renderer.setSize(this.common.width, this.common.height);
                    this.common.renderer.domElement.style.width = '100%';
                    this.common.renderer.domElement.style.height = '100%';
                    this.common.renderer.domElement.style.display = 'block';

                    this.common.clock = new THREE.Clock();
                    this.common.clock.start();

                    this.container.prepend(this.common.renderer.domElement);
                }

                resizeCommon() {
                    const rect = this.container.getBoundingClientRect();
                    this.common.width = Math.max(1, Math.floor(rect.width));
                    this.common.height = Math.max(1, Math.floor(rect.height));
                    this.common.aspect = this.common.width / this.common.height;
                    if (this.common.renderer) {
                        this.common.renderer.setSize(this.common.width, this.common.height, false);
                    }
                }

                updateCommon() {
                    this.common.delta = this.common.clock.getDelta();
                    this.common.time += this.common.delta;
                }

                // ==================== MOUSE ====================

                initMouse() {
                    this.mouse = {
                        mouseMoved: false,
                        coords: new THREE.Vector2(),
                        coords_old: new THREE.Vector2(),
                        diff: new THREE.Vector2(),
                        timer: null,
                        isHoverInside: false,
                        hasUserControl: false,
                        isAutoActive: false,
                        autoIntensity: this.options.autoIntensity,
                        takeoverActive: false,
                        takeoverStartTime: 0,
                        takeoverDuration: this.options.takeoverDuration,
                        takeoverFrom: new THREE.Vector2(),
                        takeoverTo: new THREE.Vector2()
                    };

                    this._onMouseMove = this.onMouseMove.bind(this);
                    this._onTouchStart = this.onTouchStart.bind(this);
                    this._onTouchMove = this.onTouchMove.bind(this);
                    this._onTouchEnd = this.onTouchEnd.bind(this);
                    this._onMouseLeave = this.onMouseLeave.bind(this);

                    window.addEventListener('mousemove', this._onMouseMove);
                    window.addEventListener('touchstart', this._onTouchStart, { passive: true });
                    window.addEventListener('touchmove', this._onTouchMove, { passive: true });
                    window.addEventListener('touchend', this._onTouchEnd);
                    document.addEventListener('mouseleave', this._onMouseLeave);
                }

                disposeMouse() {
                    window.removeEventListener('mousemove', this._onMouseMove);
                    window.removeEventListener('touchstart', this._onTouchStart);
                    window.removeEventListener('touchmove', this._onTouchMove);
                    window.removeEventListener('touchend', this._onTouchEnd);
                    document.removeEventListener('mouseleave', this._onMouseLeave);
                }

                isPointInside(clientX, clientY) {
                    const rect = this.container.getBoundingClientRect();
                    if (rect.width === 0 || rect.height === 0) return false;
                    return clientX >= rect.left && clientX <= rect.right &&
                        clientY >= rect.top && clientY <= rect.bottom;
                }

                setMouseCoords(x, y) {
                    if (this.mouse.timer) clearTimeout(this.mouse.timer);

                    const rect = this.container.getBoundingClientRect();
                    if (rect.width === 0 || rect.height === 0) return;

                    const nx = (x - rect.left) / rect.width;
                    const ny = (y - rect.top) / rect.height;
                    this.mouse.coords.set(nx * 2 - 1, -(ny * 2 - 1));
                    this.mouse.mouseMoved = true;

                    this.mouse.timer = setTimeout(() => {
                        this.mouse.mouseMoved = false;
                    }, 100);
                }

                setMouseNormalized(nx, ny) {
                    this.mouse.coords.set(nx, ny);
                    this.mouse.mouseMoved = true;
                }

                onUserInteract() {
                    this.lastUserInteraction = performance.now();
                    if (this.autoDriver) this.forceStopAuto();
                }

                onMouseMove(event) {
                    this.mouse.isHoverInside = this.isPointInside(event.clientX, event.clientY);
                    if (!this.mouse.isHoverInside) return;

                    this.onUserInteract();

                    if (this.mouse.isAutoActive && !this.mouse.hasUserControl && !this.mouse.takeoverActive) {
                        const rect = this.container.getBoundingClientRect();
                        if (rect.width === 0 || rect.height === 0) return;
                        const nx = (event.clientX - rect.left) / rect.width;
                        const ny = (event.clientY - rect.top) / rect.height;
                        this.mouse.takeoverFrom.copy(this.mouse.coords);
                        this.mouse.takeoverTo.set(nx * 2 - 1, -(ny * 2 - 1));
                        this.mouse.takeoverStartTime = performance.now();
                        this.mouse.takeoverActive = true;
                        this.mouse.hasUserControl = true;
                        this.mouse.isAutoActive = false;
                        return;
                    }

                    this.setMouseCoords(event.clientX, event.clientY);
                    this.mouse.hasUserControl = true;
                }

                onTouchStart(event) {
                    if (event.touches.length !== 1) return;
                    const t = event.touches[0];
                    this.mouse.isHoverInside = this.isPointInside(t.clientX, t.clientY);
                    if (!this.mouse.isHoverInside) return;
                    this.onUserInteract();
                    this.setMouseCoords(t.clientX, t.clientY);
                    this.mouse.hasUserControl = true;
                }

                onTouchMove(event) {
                    if (event.touches.length !== 1) return;
                    const t = event.touches[0];
                    this.mouse.isHoverInside = this.isPointInside(t.clientX, t.clientY);
                    if (!this.mouse.isHoverInside) return;
                    this.onUserInteract();
                    this.setMouseCoords(t.clientX, t.clientY);
                }

                onTouchEnd() {
                    this.mouse.isHoverInside = false;
                }

                onMouseLeave() {
                    this.mouse.isHoverInside = false;
                }

                updateMouse() {
                    if (this.mouse.takeoverActive) {
                        const t = (performance.now() - this.mouse.takeoverStartTime) / (this.mouse.takeoverDuration * 1000);
                        if (t >= 1) {
                            this.mouse.takeoverActive = false;
                            this.mouse.coords.copy(this.mouse.takeoverTo);
                            this.mouse.coords_old.copy(this.mouse.coords);
                            this.mouse.diff.set(0, 0);
                        } else {
                            const k = t * t * (3 - 2 * t);
                            this.mouse.coords.copy(this.mouse.takeoverFrom).lerp(this.mouse.takeoverTo, k);
                        }
                    }

                    this.mouse.diff.subVectors(this.mouse.coords, this.mouse.coords_old);
                    this.mouse.coords_old.copy(this.mouse.coords);

                    if (this.mouse.coords_old.x === 0 && this.mouse.coords_old.y === 0) {
                        this.mouse.diff.set(0, 0);
                    }

                    if (this.mouse.isAutoActive && !this.mouse.takeoverActive) {
                        this.mouse.diff.multiplyScalar(this.mouse.autoIntensity);
                    }
                }

                // ==================== AUTO DRIVER ====================

                initAutoDriver() {
                    this.autoDriver = {
                        enabled: this.options.autoDemo,
                        speed: this.options.autoSpeed,
                        resumeDelay: this.options.autoResumeDelay,
                        rampDurationMs: this.options.autoRampDuration * 1000,
                        active: false,
                        current: new THREE.Vector2(0, 0),
                        target: new THREE.Vector2(),
                        lastTime: performance.now(),
                        activationTime: 0,
                        margin: 0.2,
                        _tmpDir: new THREE.Vector2()
                    };

                    this.pickNewAutoTarget();
                }

                pickNewAutoTarget() {
                    const r = Math.random;
                    const margin = this.autoDriver.margin;
                    this.autoDriver.target.set(
                        (r() * 2 - 1) * (1 - margin),
                        (r() * 2 - 1) * (1 - margin)
                    );
                }

                forceStopAuto() {
                    this.autoDriver.active = false;
                    this.mouse.isAutoActive = false;
                }

                updateAutoDriver() {
                    if (!this.autoDriver.enabled) return;

                    const now = performance.now();
                    const idle = now - this.lastUserInteraction;

                    if (idle < this.autoDriver.resumeDelay) {
                        if (this.autoDriver.active) this.forceStopAuto();
                        return;
                    }

                    if (this.mouse.isHoverInside) {
                        if (this.autoDriver.active) this.forceStopAuto();
                        return;
                    }

                    if (!this.autoDriver.active) {
                        this.autoDriver.active = true;
                        this.autoDriver.current.copy(this.mouse.coords);
                        this.autoDriver.lastTime = now;
                        this.autoDriver.activationTime = now;
                    }

                    if (!this.autoDriver.active) return;

                    this.mouse.isAutoActive = true;

                    let dtSec = (now - this.autoDriver.lastTime) / 1000;
                    this.autoDriver.lastTime = now;
                    if (dtSec > 0.2) dtSec = 0.016;

                    const dir = this.autoDriver._tmpDir.subVectors(this.autoDriver.target, this.autoDriver.current);
                    const dist = dir.length();

                    if (dist < 0.01) {
                        this.pickNewAutoTarget();
                        return;
                    }

                    dir.normalize();

                    let ramp = 1;
                    if (this.autoDriver.rampDurationMs > 0) {
                        const t = Math.min(1, (now - this.autoDriver.activationTime) / this.autoDriver.rampDurationMs);
                        ramp = t * t * (3 - 2 * t);
                    }

                    const step = this.autoDriver.speed * dtSec * ramp;
                    const move = Math.min(step, dist);
                    this.autoDriver.current.addScaledVector(dir, move);
                    this.setMouseNormalized(this.autoDriver.current.x, this.autoDriver.current.y);
                }

                // ==================== SHADER PASS ====================

                createShaderPass(props) {
                    const pass = {
                        props: props || {},
                        uniforms: props.material?.uniforms,
                        scene: new THREE.Scene(),
                        camera: new THREE.Camera(),
                        material: null,
                        geometry: null,
                        plane: null
                    };

                    if (pass.uniforms) {
                        pass.material = new THREE.RawShaderMaterial(props.material);
                        pass.geometry = new THREE.PlaneGeometry(2.0, 2.0);
                        pass.plane = new THREE.Mesh(pass.geometry, pass.material);
                        pass.scene.add(pass.plane);
                    }

                    return pass;
                }

                updateShaderPass(pass) {
                    this.common.renderer.setRenderTarget(pass.props.output || null);
                    this.common.renderer.render(pass.scene, pass.camera);
                    this.common.renderer.setRenderTarget(null);
                }

                // ==================== SIMULATION ====================

                initSimulation() {
                    this.simulation = {
                        fbos: {
                            vel_0: null,
                            vel_1: null,
                            vel_viscous0: null,
                            vel_viscous1: null,
                            div: null,
                            pressure_0: null,
                            pressure_1: null
                        },
                        fboSize: new THREE.Vector2(),
                        cellScale: new THREE.Vector2(),
                        boundarySpace: new THREE.Vector2(),
                        passes: {}
                    };

                    this.calcSimSize();
                    this.createAllFBO();
                    this.createShaderPasses();
                }

                getFloatType() {
                    const isIOS = /(iPad|iPhone|iPod)/i.test(navigator.userAgent);
                    return isIOS ? THREE.HalfFloatType : THREE.FloatType;
                }

                createAllFBO() {
                    const type = this.getFloatType();
                    const opts = {
                        type,
                        depthBuffer: false,
                        stencilBuffer: false,
                        minFilter: THREE.LinearFilter,
                        magFilter: THREE.LinearFilter,
                        wrapS: THREE.ClampToEdgeWrapping,
                        wrapT: THREE.ClampToEdgeWrapping
                    };

                    for (let key in this.simulation.fbos) {
                        this.simulation.fbos[key] = new THREE.WebGLRenderTarget(
                            this.simulation.fboSize.x,
                            this.simulation.fboSize.y,
                            opts
                        );
                    }
                }

                calcSimSize() {
                    const width = Math.max(1, Math.round(this.options.resolution * this.common.width));
                    const height = Math.max(1, Math.round(this.options.resolution * this.common.height));
                    const px_x = 1.0 / width;
                    const px_y = 1.0 / height;
                    this.simulation.cellScale.set(px_x, px_y);
                    this.simulation.fboSize.set(width, height);
                }

                createShaderPasses() {
                    const sim = this.simulation;
                    const shaders = this.shaders;

                    // Advection pass
                    sim.passes.advection = this.createShaderPass({
                        material: {
                            vertexShader: shaders.face_vert,
                            fragmentShader: shaders.advection_frag,
                            uniforms: {
                                boundarySpace: { value: sim.cellScale },
                                px: { value: sim.cellScale },
                                fboSize: { value: sim.fboSize },
                                velocity: { value: sim.fbos.vel_0.texture },
                                dt: { value: this.options.dt },
                                isBFECC: { value: true }
                            }
                        },
                        output: sim.fbos.vel_1
                    });

                    // Add boundary lines to advection
                    const boundaryG = new THREE.BufferGeometry();
                    const vertices_boundary = new Float32Array([
                        -1, -1, 0, -1, 1, 0, -1, 1, 0, 1, 1, 0,
                        1, 1, 0, 1, -1, 0, 1, -1, 0, -1, -1, 0
                    ]);
                    boundaryG.setAttribute('position', new THREE.BufferAttribute(vertices_boundary, 3));
                    const boundaryM = new THREE.RawShaderMaterial({
                        vertexShader: shaders.line_vert,
                        fragmentShader: shaders.advection_frag,
                        uniforms: sim.passes.advection.uniforms
                    });
                    sim.passes.advection.line = new THREE.LineSegments(boundaryG, boundaryM);
                    sim.passes.advection.scene.add(sim.passes.advection.line);

                    // External force pass
                    sim.passes.externalForce = this.createShaderPass({ output: sim.fbos.vel_1 });
                    const mouseG = new THREE.PlaneGeometry(1, 1);
                    const mouseM = new THREE.RawShaderMaterial({
                        vertexShader: shaders.mouse_vert,
                        fragmentShader: shaders.externalForce_frag,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                        uniforms: {
                            px: { value: sim.cellScale },
                            force: { value: new THREE.Vector2(0.0, 0.0) },
                            center: { value: new THREE.Vector2(0.0, 0.0) },
                            scale: { value: new THREE.Vector2(this.options.cursorSize, this.options.cursorSize) }
                        }
                    });
                    sim.passes.externalForce.mouse = new THREE.Mesh(mouseG, mouseM);
                    sim.passes.externalForce.scene.add(sim.passes.externalForce.mouse);

                    // Viscous pass
                    sim.passes.viscous = this.createShaderPass({
                        material: {
                            vertexShader: shaders.face_vert,
                            fragmentShader: shaders.viscous_frag,
                            uniforms: {
                                boundarySpace: { value: sim.boundarySpace },
                                velocity: { value: sim.fbos.vel_1.texture },
                                velocity_new: { value: sim.fbos.vel_viscous0.texture },
                                v: { value: this.options.viscous },
                                px: { value: sim.cellScale },
                                dt: { value: this.options.dt }
                            }
                        },
                        output: sim.fbos.vel_viscous1,
                        output0: sim.fbos.vel_viscous0,
                        output1: sim.fbos.vel_viscous1
                    });

                    // Divergence pass
                    sim.passes.divergence = this.createShaderPass({
                        material: {
                            vertexShader: shaders.face_vert,
                            fragmentShader: shaders.divergence_frag,
                            uniforms: {
                                boundarySpace: { value: sim.boundarySpace },
                                velocity: { value: sim.fbos.vel_viscous0.texture },
                                px: { value: sim.cellScale },
                                dt: { value: this.options.dt }
                            }
                        },
                        output: sim.fbos.div
                    });

                    // Poisson pass
                    sim.passes.poisson = this.createShaderPass({
                        material: {
                            vertexShader: shaders.face_vert,
                            fragmentShader: shaders.poisson_frag,
                            uniforms: {
                                boundarySpace: { value: sim.boundarySpace },
                                pressure: { value: sim.fbos.pressure_0.texture },
                                divergence: { value: sim.fbos.div.texture },
                                px: { value: sim.cellScale }
                            }
                        },
                        output: sim.fbos.pressure_1,
                        output0: sim.fbos.pressure_0,
                        output1: sim.fbos.pressure_1
                    });

                    // Pressure pass
                    sim.passes.pressure = this.createShaderPass({
                        material: {
                            vertexShader: shaders.face_vert,
                            fragmentShader: shaders.pressure_frag,
                            uniforms: {
                                boundarySpace: { value: sim.boundarySpace },
                                pressure: { value: sim.fbos.pressure_0.texture },
                                velocity: { value: sim.fbos.vel_viscous0.texture },
                                px: { value: sim.cellScale },
                                dt: { value: this.options.dt }
                            }
                        },
                        output: sim.fbos.vel_0
                    });
                }

                resizeSimulation() {
                    this.calcSimSize();
                    for (let key in this.simulation.fbos) {
                        this.simulation.fbos[key].setSize(this.simulation.fboSize.x, this.simulation.fboSize.y);
                    }
                }

                updateSimulation() {
                    const sim = this.simulation;
                    const opts = this.options;

                    if (opts.isBounce) {
                        sim.boundarySpace.set(0, 0);
                    } else {
                        sim.boundarySpace.copy(sim.cellScale);
                    }

                    // Advection
                    const advUniforms = sim.passes.advection.uniforms;
                    advUniforms.dt.value = opts.dt;
                    advUniforms.isBFECC.value = opts.BFECC;
                    sim.passes.advection.line.visible = opts.isBounce;
                    this.updateShaderPass(sim.passes.advection);

                    // External force
                    const forceX = (this.mouse.diff.x / 2) * opts.mouseForce;
                    const forceY = (this.mouse.diff.y / 2) * opts.mouseForce;
                    const cursorSizeX = opts.cursorSize * sim.cellScale.x;
                    const cursorSizeY = opts.cursorSize * sim.cellScale.y;
                    const centerX = Math.min(
                        Math.max(this.mouse.coords.x, -1 + cursorSizeX + sim.cellScale.x * 2),
                        1 - cursorSizeX - sim.cellScale.x * 2
                    );
                    const centerY = Math.min(
                        Math.max(this.mouse.coords.y, -1 + cursorSizeY + sim.cellScale.y * 2),
                        1 - cursorSizeY - sim.cellScale.y * 2
                    );
                    const forceUniforms = sim.passes.externalForce.mouse.material.uniforms;
                    forceUniforms.force.value.set(forceX, forceY);
                    forceUniforms.center.value.set(centerX, centerY);
                    forceUniforms.scale.value.set(opts.cursorSize, opts.cursorSize);
                    this.updateShaderPass(sim.passes.externalForce);

                    // Viscous
                    let vel = sim.fbos.vel_1;
                    if (opts.isViscous) {
                        const viscousPass = sim.passes.viscous;
                        viscousPass.uniforms.v.value = opts.viscous;
                        let fbo_in, fbo_out;
                        for (let i = 0; i < opts.iterationsViscous; i++) {
                            if (i % 2 === 0) {
                                fbo_in = viscousPass.props.output0;
                                fbo_out = viscousPass.props.output1;
                            } else {
                                fbo_in = viscousPass.props.output1;
                                fbo_out = viscousPass.props.output0;
                            }
                            viscousPass.uniforms.velocity_new.value = fbo_in.texture;
                            viscousPass.props.output = fbo_out;
                            viscousPass.uniforms.dt.value = opts.dt;
                            this.updateShaderPass(viscousPass);
                        }
                        vel = fbo_out;
                    }

                    // Divergence
                    sim.passes.divergence.uniforms.velocity.value = vel.texture;
                    this.updateShaderPass(sim.passes.divergence);

                    // Poisson
                    const poissonPass = sim.passes.poisson;
                    let p_in, p_out;
                    for (let i = 0; i < opts.iterationsPoisson; i++) {
                        if (i % 2 === 0) {
                            p_in = poissonPass.props.output0;
                            p_out = poissonPass.props.output1;
                        } else {
                            p_in = poissonPass.props.output1;
                            p_out = poissonPass.props.output0;
                        }
                        poissonPass.uniforms.pressure.value = p_in.texture;
                        poissonPass.props.output = p_out;
                        this.updateShaderPass(poissonPass);
                    }
                    const pressure = p_out;

                    // Pressure
                    sim.passes.pressure.uniforms.velocity.value = vel.texture;
                    sim.passes.pressure.uniforms.pressure.value = pressure.texture;
                    this.updateShaderPass(sim.passes.pressure);
                }

                // ==================== OUTPUT ====================

                initOutput() {
                    this.paletteTex = this.makePaletteTexture(this.options.colors);
                    this.bgVec4 = new THREE.Vector4(0, 0, 0, 0);

                    this.output = {
                        scene: new THREE.Scene(),
                        camera: new THREE.Camera(),
                        mesh: null
                    };

                    this.output.mesh = new THREE.Mesh(
                        new THREE.PlaneGeometry(2, 2),
                        new THREE.RawShaderMaterial({
                            vertexShader: this.shaders.face_vert,
                            fragmentShader: this.shaders.color_frag,
                            transparent: true,
                            depthWrite: false,
                            uniforms: {
                                velocity: { value: this.simulation.fbos.vel_0.texture },
                                boundarySpace: { value: new THREE.Vector2() },
                                palette: { value: this.paletteTex },
                                bgColor: { value: this.bgVec4 }
                            }
                        })
                    );

                    this.output.scene.add(this.output.mesh);
                }

                renderOutput() {
                    this.common.renderer.setRenderTarget(null);
                    this.common.renderer.render(this.output.scene, this.output.camera);
                }

                // ==================== MAIN ====================

                init() {
                    this.container.style.position = this.container.style.position || 'relative';
                    this.container.style.overflow = this.container.style.overflow || 'hidden';

                    this.lastUserInteraction = performance.now();

                    this.initCommon();
                    this.initMouse();
                    this.initAutoDriver();
                    this.initSimulation();
                    this.initOutput();

                    this._boundResize = this.resize.bind(this);
                    this._boundLoop = this.loop.bind(this);

                    window.addEventListener('resize', this._boundResize);

                    // Visibility change handling
                    this._onVisibility = () => {
                        if (document.hidden) {
                            this.pause();
                        } else if (this.isVisible) {
                            this.start();
                        }
                    };
                    document.addEventListener('visibilitychange', this._onVisibility);

                    // Intersection observer
                    this.intersectionObserver = new IntersectionObserver(
                        (entries) => {
                            const entry = entries[0];
                            this.isVisible = entry.isIntersecting && entry.intersectionRatio > 0;
                            if (this.isVisible && !document.hidden) {
                                this.start();
                            } else {
                                this.pause();
                            }
                        },
                        { threshold: [0, 0.01, 0.1] }
                    );
                    this.intersectionObserver.observe(this.container);

                    // ResizeObserver
                    this.resizeObserver = new ResizeObserver(() => {
                        if (this.resizeRafId) cancelAnimationFrame(this.resizeRafId);
                        this.resizeRafId = requestAnimationFrame(() => this.resize());
                    });
                    this.resizeObserver.observe(this.container);

                    this.start();
                }

                resize() {
                    this.resizeCommon();
                    this.resizeSimulation();
                }

                loop() {
                    if (!this.isRunning) return;

                    this.updateAutoDriver();
                    this.updateMouse();
                    this.updateCommon();
                    this.updateSimulation();
                    this.renderOutput();

                    this.rafId = requestAnimationFrame(this._boundLoop);
                }

                start() {
                    if (this.isRunning) return;
                    this.isRunning = true;
                    this.loop();
                }

                pause() {
                    this.isRunning = false;
                    if (this.rafId) {
                        cancelAnimationFrame(this.rafId);
                        this.rafId = null;
                    }
                }

                updateOptions(newOptions) {
                    Object.assign(this.options, newOptions);

                    // Update auto driver settings
                    if (this.autoDriver) {
                        this.autoDriver.enabled = this.options.autoDemo;
                        this.autoDriver.speed = this.options.autoSpeed;
                        this.autoDriver.resumeDelay = this.options.autoResumeDelay;
                        this.autoDriver.rampDurationMs = this.options.autoRampDuration * 1000;
                    }

                    // Update mouse settings
                    if (this.mouse) {
                        this.mouse.autoIntensity = this.options.autoIntensity;
                        this.mouse.takeoverDuration = this.options.takeoverDuration;
                    }

                    // Update colors
                    if (newOptions.colors) {
                        this.paletteTex = this.makePaletteTexture(this.options.colors);
                        this.output.mesh.material.uniforms.palette.value = this.paletteTex;
                    }
                }

                destroy() {
                    this.pause();

                    window.removeEventListener('resize', this._boundResize);
                    document.removeEventListener('visibilitychange', this._onVisibility);
                    this.disposeMouse();

                    if (this.intersectionObserver) {
                        this.intersectionObserver.disconnect();
                    }

                    if (this.resizeObserver) {
                        this.resizeObserver.disconnect();
                    }

                    if (this.common.renderer) {
                        const canvas = this.common.renderer.domElement;
                        if (canvas && canvas.parentNode) {
                            canvas.parentNode.removeChild(canvas);
                        }
                        this.common.renderer.dispose();
                    }

                    // Dispose FBOs
                    for (let key in this.simulation.fbos) {
                        if (this.simulation.fbos[key]) {
                            this.simulation.fbos[key].dispose();
                        }
                    }
                }
            }

            // ==================== USAGE ====================

            const container = document.getElementById('container');

            const liquidEther = new LiquidEther(container, {
                colors: ['#5227FF', '#FF9FFC', '#B19EEF'],
                mouseForce: 20,
                cursorSize: 100,
                isViscous: true,
                viscous: 30,
                iterationsViscous: 32,
                iterationsPoisson: 32,
                resolution: 0.5,
                isBounce: false,
                autoDemo: true,
                autoSpeed: 0.5,
                autoIntensity: 2.2,
                takeoverDuration: 0.25,
                autoResumeDelay: 1000,
                autoRampDuration: 0.6
            });

            // Cleanup on page unload
            window.addEventListener('beforeunload', () => {
                liquidEther.destroy();
            });
        </script>
    </body>

</html>
