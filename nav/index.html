<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nav</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>


        <div class="nav" id="navbar">
            <div class="navdiv1">Menu 1</div>
            <div class="navdiv2">Menu 2</div>
            <div class="navdiv3">Menu 3</div>
            <div class="navdiv4">Menu 4</div>
            <div class="navdiv5">Menu 5</div>
            <div class="navdiv6"> </div>
            <div class="navdiv7"><button>bouton</button></div>
        </div>



        <script>
            let prevScrollpos = window.pageYOffset;
            const navbar = document.getElementById("navbar");

            window.addEventListener("scroll", () => {

                let currentScrollPos = window.pageYOffset;

                if (currentScrollPos > 100 && prevScrollpos < currentScrollPos) {
                    navbar.style.opacity = "0";
                } else {
                    navbar.style.opacity = "1";
                }

                prevScrollpos = currentScrollPos;
            });
        </script>

    </body>

</html>
